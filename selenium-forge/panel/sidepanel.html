  <title>SeleniumForge</title>
  <style>
    /* ─── CSS Custom Properties ─────────────────────────────────────────────── */
    :root {
      --color-bg:           #f5f6f8;
      --color-surface:      #ffffff;
      --color-surface-2:    #f0f1f4;
      --color-surface-3:    #e4e6eb;
      --color-border:       #d1d5db;
      --color-border-soft:  #e8eaed;
      --color-text:         #111827;
      --color-text-2:       #374151;
      --color-text-3:       #6b7280;
      --color-text-4:       #9ca3af;
      --color-accent:       #2563eb;
      --color-accent-hover: #1d4ed8;
      --color-accent-soft:  #eff6ff;
      --color-accent-text:  #1e40af;
      --color-red:          #dc2626;
      --color-red-soft:     #fef2f2;
      --color-green:        #16a34a;
      --color-green-soft:   #f0fdf4;
      --color-yellow:       #d97706;
      --color-yellow-soft:  #fffbeb;
      --color-orange:       #ea580c;
      --color-orange-soft:  #fff7ed;
      --color-purple:       #7c3aed;
      --color-purple-soft:  #f5f3ff;
      --color-toolbar-bg:   #1e2433;
      --color-toolbar-text: #e5e7eb;
      --color-toolbar-border: #2d3548;
      --color-toolbar-btn:  #2d3548;
      --color-toolbar-btn-hover: #374162;
      --color-toolbar-icon: #9ca3af;

      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;

      --text-xs:  11px;
      --text-sm:  12px;
      --text-base: 13px;
      --text-md:  14px;

      --radius-sm: 3px;
      --radius:    5px;
      --radius-md: 7px;

      --shadow-sm: 0 1px 2px rgba(0,0,0,0.07);
      --shadow:    0 2px 8px rgba(0,0,0,0.10);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.14);

      --sidebar-width: 220px;
      --artifacts-height: 180px;
      --toolbar-height: 40px;
    }
  </style>
</head>
