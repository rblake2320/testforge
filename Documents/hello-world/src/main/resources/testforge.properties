# TestForge Configuration
# Override any property on the command line: mvn test -Dbrowser=chrome

# Browser: edge, chrome, firefox
browser=edge

# Driver paths (leave blank to use WebDriverManager auto-detection)
edge.driver.path=C:\\ProgramData\\chocolatey\\bin\\msedgedriver.exe
chrome.driver.path=
firefox.driver.path=

# Wait timeouts (seconds)
implicit.wait=0
explicit.wait=20
page.load.timeout=30

# Browser options
headless=false
start.maximized=true

# Screenshot directory (relative to project root)
screenshot.dir=target/screenshots

# Base URL (optional - used when feature files reference relative paths)
base.url=

# ── Jira Integration ──────────────────────────────────────────────────────────
# Set jira.enabled=true and fill in credentials to activate.
# Get your API token from: https://id.atlassian.com/manage-profile/security/api-tokens
# NOTE: API tokens created before Dec 15, 2024 expire between Mar-May 2026.
#       New tokens can be set to expire from 1-365 days. Rotate before expiry.
#       Basic auth with email+token is correct for CI/CD automation use cases.
jira.enabled=false
jira.url=https://your-instance.atlassian.net
jira.project=YOUR-PROJECT-KEY
jira.email=your-email@example.com
jira.api.token=your-api-token

# Issue type to create on failure (must exist in your project)
jira.issuetype=Task

# Priority for auto-created bugs (must match your Jira priority names)
jira.priority=

# Labels to add to auto-created bugs (comma-separated)
jira.labels=automated-test,testforge

# Set to false to skip creating a new bug if an identical open one exists
jira.create.duplicate=false

# Optionally assign created bugs to a user (Jira account ID, not username)
# Leave blank to leave unassigned
jira.assignee.account.id=
