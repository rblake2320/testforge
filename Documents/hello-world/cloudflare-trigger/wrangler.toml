name              = "testforge-trigger"
main              = "src/worker.js"
compatibility_date = "2024-11-01"

[vars]
GITHUB_REPO    = "rblake2320/testforge"
WORKFLOW_FILE  = "testforge.yml"
GITHUB_BRANCH  = "master"

# Secrets — set these via the command line, never put real values here:
#   wrangler secret put TRIGGER_SECRET
#   wrangler secret put GITHUB_TOKEN
#
# TRIGGER_SECRET : any random string (protects the endpoint)
# GITHUB_TOKEN   : GitHub PAT with Actions (read/write) permission
